version: "3.9"

# ─── Production Docker Compose ─────────────────────────────────────────────────
# Usage:
#   1. Copy .env.example → .env and fill secrets
#   2. docker compose up -d
#   3. docker compose exec backend node scripts/migrate.js
#   4. docker compose exec backend node scripts/seed.js (dev only)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/scripts/migrate_v2_security.sql:/docker-entrypoint-initdb.d/02_security.sql:ro
    environment:
      POSTGRES_DB: ${DB_NAME:-FutureFin_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-FutureFin_db}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-FutureFin_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "false"
      DB_POOL_MAX: 20
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama3-70b-8192}
      GROQ_FAST_MODEL: ${GROQ_FAST_MODEL:-llama3-8b-8192}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 30d
      BCRYPT_ROUNDS: 12
      FRONTEND_URL: ${FRONTEND_URL:-https://FutureFin.ai}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      USD_TO_INR_RATE: ${USD_TO_INR_RATE:-83}
      ETHICAL_AI_ENABLED: "true"
      BIAS_DETECTION_ENABLED: "true"
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - external
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.FutureFin.ai`)"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"

  # ── Frontend (Nginx serving built SPA) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.FutureFin.ai/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - external
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`FutureFin.ai`)"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"

  # ── Traefik (reverse proxy + TLS) ───────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@FutureFin.ai}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - external

volumes:
  postgres_data:
  redis_data:
  letsencrypt:

networks:
  internal:
    internal: true # Postgres + Redis only reachable within Docker network
  external:
    driver: bridge
