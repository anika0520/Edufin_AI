name: FutureFin CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests & Security Scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: FutureFin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Run schema migration
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/FutureFin_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: FutureFin_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
        run: node scripts/migrate.js

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/FutureFin_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: FutureFin_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --build --dry

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.FutureFin.ai/api/v1
        run: npm run build

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to Render / Railway
        run: |
          echo "Add your deployment webhook here:"
          echo "  Render: curl -X POST \$RENDER_DEPLOY_HOOK"
          echo "  Railway: railway up"
          echo "  Fly.io: fly deploy"
        # Uncomment one of these:
        # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        # curl -X POST ${{ secrets.RAILWAY_DEPLOY_HOOK }}
