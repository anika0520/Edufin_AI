version: '3.8'

services:
  # PostgreSQL - Free, self-hosted
  postgres:
    image: postgres:15-alpine
    container_name: edufin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edufin_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: edufin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Free, self-hosted
  redis:
    image: redis:7-alpine
    container_name: edufin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB - Free local vector database
  chromadb:
    image: chromadb/chroma:latest
    container_name: edufin_chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE

  # EduFin API - The main application
  api:
    build: .
    container_name: edufin_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: edufin_ai
      DB_USER: postgres
      DB_PASSWORD: edufin_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      AI_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  chroma_data:
